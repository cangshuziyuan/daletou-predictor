name: Walk-Forward Backtest

# 手动触发：在 N 期历史上做严格 walk-forward，用于填充 methodology 页的统计判决数据
# 单 job 受 GitHub Actions 6h 硬上限限制，因此本 workflow 采用「时间预算 + 自动接力」策略：
#   1) backtest 跑满 TIME_BUDGET_SECONDS 后主动停机（不是 timeout kill），
#      之前算的预测已每期 commit 到 DB；
#   2) Export/Render/Commit 步骤始终执行，把 DB + JSON + 图表推回仓库；
#   3) 若 .backtest_state.json 显示未完成，最后一步自动 `gh workflow run` 再触发本 workflow，
#      下一轮 checkout 到最新 DB，靠"已存在就跳过"的逻辑从断点继续。
on:
  workflow_dispatch:
    inputs:
      start:
        description: "起始索引（0-based 行号；负数=倒数 N 期。-10000≈从全库最早可评估点起，即 backtest_min_start_index）"
        required: true
        default: "-10000"
      force:
        description: "是否覆盖已有预测（true/false，开启续跑请保持 false）"
        required: true
        default: "false"
      models:
        description: "只跑哪些模型（逗号分隔；空 = 全部 9 模型。全库回测很重，可填 random,frequency 等做快速试跑）"
        required: false
        default: ""
      auto_continue:
        description: "未跑完时自动触发下一轮续跑（true/false）"
        required: false
        default: "true"
      time_budget_seconds:
        description: "单轮 backtest 时间预算（秒）。默认 3600=60min，让接力更频繁，这样 predict/evaluate 触发窗口不会被错过（GitHub schedule 不可信，预测触发靠 backtest 接力心跳）。bootstrap 会稍慢但稳"
        required: false
        default: "3600"

permissions:
  contents: write
  actions: write # 需要此权限才能用 GITHUB_TOKEN 调 `gh workflow run` 自动接力

concurrency:
  group: backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 355 # GitHub 免费 runner 单 job 硬上限是 360min，留 5min 安全边际

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run walk-forward backtest (with time budget)
        id: backtest
        env:
          ONLY_MODELS: ${{ inputs.models }}
          TIME_BUDGET: ${{ inputs.time_budget_seconds }}
        run: |
          ARGS="--start ${{ inputs.start }} --time-budget-seconds $TIME_BUDGET"
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "$ONLY_MODELS" ]; then ARGS="$ARGS --only $ONLY_MODELS"; fi
          echo "[cmd] python -m backend.src.tasks.backtest $ARGS"
          python -m backend.src.tasks.backtest $ARGS

      - name: Show progress state
        if: always()
        run: |
          if [ -f data/.backtest_state.json ]; then
            echo "===== backtest state ====="
            cat data/.backtest_state.json
            echo
            echo "=========================="
          else
            echo "WARNING: data/.backtest_state.json 不存在，可能在生成前就出错了"
          fi

      - name: Export JSON (含 significance.json)
        if: always()
        run: python -m backend.src.export.to_json

      - name: Render charts
        if: always()
        run: python -m backend.src.export.chart

      - name: Append RUN_LOG.jsonl (reflection substrate)
        if: always()
        env:
          BACKTEST_OUTCOME: ${{ steps.backtest.outcome }}
        run: |
          # 把 .backtest_state.json 作为 extra 附到 run log，供下次 AI 反思时看到进度趋势
          EXTRA_JSON="{}"
          if [ -f data/.backtest_state.json ]; then
            EXTRA_JSON=$(python -c "import json; s=json.load(open('data/.backtest_state.json')); print(json.dumps({k:s.get(k) for k in ['done','processed','total','last_issue','stopped_early']}))")
          fi
          python -m backend.src.utils.run_log \
            --workflow backtest \
            --outcome "$BACKTEST_OUTCOME" \
            --extra-json "$EXTRA_JSON"

      - name: Commit progress (db + json + charts + state + run log)
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(backtest): walk-forward ${{ inputs.start }} progress"
          file_pattern: |
            data/daletou.db
            data/export/*.json
            data/img/*.png
            data/.backtest_state.json
            data/lstm_state.pt
            data/lstm_meta.json
            data/transformer_state.pt
            data/transformer_meta.json
            data/xgboost_probs.npz
            docs/RUN_LOG.jsonl
            docs/RUN_LOG.archive.jsonl

      - name: Decide whether to notify (reduce spam)
        if: always()
        id: notify_gate
        env:
          BACKTEST_OUTCOME: ${{ steps.backtest.outcome }}
        run: |
          notify="false"
          reason="skip"

          # 失败/取消/超时等：永远通知
          outcome="$(echo "${BACKTEST_OUTCOME:-success}" | tr '[:upper:]' '[:lower:]')"
          if [ -n "$outcome" ] && [ "$outcome" != "success" ]; then
            notify="true"
            reason="outcome=$outcome"
          else
            # 成功时：仅在回测 done=true 才通知（进度心跳不再刷屏）
            if [ -f data/.backtest_state.json ]; then
              done=$(python -c "import json; print(str(bool(json.load(open('data/.backtest_state.json')).get('done'))).lower())" 2>/dev/null || echo "false")
              if [ "$done" = "true" ]; then
                notify="true"
                reason="done=true"
              fi
            fi
          fi

          echo "notify=$notify" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "[notify_gate] notify=$notify reason=$reason"

      - name: Notify progress / completion / failure
        if: always() && steps.notify_gate.outputs.notify == 'true'
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_AES_KEY: ${{ secrets.BARK_AES_KEY }}
          BARK_AES_IV: ${{ secrets.BARK_AES_IV }}
          BACKTEST_OUTCOME: ${{ steps.backtest.outcome }}
        run: python -m backend.src.tasks.notify_backtest

      - name: Freshness check (alert only)
        if: always()
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_AES_KEY: ${{ secrets.BARK_AES_KEY }}
          BARK_AES_IV: ${{ secrets.BARK_AES_IV }}
        run: python -m backend.src.tasks.check_freshness || true

      - name: Auto-dispatch (backtest 接力 + evaluate 窗口心跳)
        # GitHub Actions 的 schedule 对这个 repo 基本失效（predict 0 次、evaluate 1 次/月），
        # 所以把 evaluate 的触发寄生到 backtest 的接力循环上：
        #   - 每次 backtest 接力结束时，判断"当前是否开奖日 21:30 之后"
        #   - 命中 → dispatch evaluate.yml
        #   - evaluate 成功后自己会链式触发 predict.yml + backtest.yml（见 evaluate.yml 的 Chain step）
        # 所以整个事件链：
        #     开奖 → backtest 心跳命中 evaluate 窗口 → evaluate 入库+推送开奖通知
        #           → predict 下一期+推送预测通知 + backtest 把新期纳入回测
        # predict 不再由 backtest 触发（用户要的节奏是"开奖后才 predict"）
        if: always() && inputs.auto_continue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START: ${{ inputs.start }}
          FORCE: ${{ inputs.force }}
          MODELS: ${{ inputs.models }}
          TIME_BUDGET: ${{ inputs.time_budget_seconds }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          now_bj=$(TZ='Asia/Shanghai' date +'%H%M')
          dow=$(TZ='Asia/Shanghai' date +'%u')
          ts_bj=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          echo "[auto] 北京时间 $ts_bj  dow=$dow (1=周一, 3=周三, 6=周六 是开奖日)"

          is_draw_day=false
          case "$dow" in 1|3|6) is_draw_day=true;; esac

          # evaluate 窗口：开奖日北京 21:30 及之后（21:15 开奖，留 15min 等官网出号）
          # evaluate 本身幂等（SELECT 只选无 results 的期号），重复 dispatch 不会重复推送
          if [ "$is_draw_day" = "true" ] && [ "$now_bj" -ge "2130" ]; then
            echo "[auto] ★ 命中 evaluate 窗口 (>=21:30)，dispatch evaluate.yml"
            gh workflow run evaluate.yml --ref "$REF_NAME" 2>&1 || echo "[auto] evaluate dispatch 失败"
          fi

          # --- backtest 自身接力（心跳兼 bootstrap） ---
          # 教训：曾出现 done=true 后仍以 ~2min/轮 空转接力，一天刷 >400 次 runner，
          # 把 main 搞得很乱也浪费配额。治理规则：
          #   done=false            → 必须接力（bootstrap 还没跑完）
          #   done=true + 非开奖日  → 不接力（交给 heartbeat.yml 每 3h 兜底；
          #                                非开奖日本来也没有 evaluate 窗口要守）
          #   done=true + 开奖日    → 北京时间 >=18:00 才接力（提前 3h 守 21:30 evaluate 窗口）
          if [ ! -f data/.backtest_state.json ]; then
            echo "[auto] state 文件不存在，跳过 backtest 续跑"
            exit 0
          fi
          DONE=$(python -c "import json,sys; sys.stdout.write(str(json.load(open('data/.backtest_state.json'))['done']).lower())")
          hour_bj=$(TZ='Asia/Shanghai' date +'%H')
          echo "[auto] backtest done=$DONE  hour_bj=$hour_bj  is_draw_day=$is_draw_day"

          need_relay=false
          if [ "$DONE" != "true" ]; then
            need_relay=true
            echo "[auto] → 需要接力：bootstrap 未完成"
          elif [ "$is_draw_day" = "true" ] && [ "$hour_bj" -ge 18 ] && [ "$hour_bj" -le 23 ]; then
            need_relay=true
            echo "[auto] → 需要接力：开奖日 18:00-23:59，守 evaluate 窗口"
          else
            echo "[auto] → 不接力：done=true 且当前非开奖日/非守望时段，交给 heartbeat 兜底"
          fi

          if [ "$need_relay" != "true" ]; then
            exit 0
          fi

          sleep 5
          # 续跑必须保持 force=false，否则会把上一轮刚写入的记录删掉重算
          gh workflow run backtest.yml \
            --ref "$REF_NAME" \
            -f start="$START" \
            -f force=false \
            -f models="$MODELS" \
            -f auto_continue=true \
            -f time_budget_seconds="$TIME_BUDGET"
          echo "[auto] 下一轮已提交（concurrency group=backtest 会等本轮完全结束后再跑）"
