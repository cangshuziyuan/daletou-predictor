name: Evaluate Draw Result

on:
  schedule:
    # 开奖后抓结果并评估：北京时间 22:30 = UTC 14:30
    # 多时间点防 GitHub schedule 延迟/跳过；evaluate_all 天然幂等（SQL 只选无 results 的期号），
    # 首次成功评估后第二次进来 evaluated_issue 为空，notify step 的 if 会自动跳过。
    - cron: "30 14 * * 1,3,6"  # 22:30
    - cron: "0 15 * * 1,3,6"   # 23:00
    - cron: "30 15 * * 1,3,6"  # 23:30
    - cron: "30 16 * * 1,3,6"  # 次日 00:30
    - cron: "30 22 * * 1,3,6"  # 次日 06:30（兜底：凌晨时段 GitHub runner 很空闲，基本必跑）
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # 评估完成后要用 GITHUB_TOKEN dispatch predict.yml / backtest.yml

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch latest draw
        run: python -m backend.src.scraper.fetch_history

      # --- 1) 评估（仅入库，不推送） ---
      - name: Evaluate (db only)
        id: eval
        run: python -m backend.src.tasks.evaluate --no-notify --print-evaluated-issue

      # --- 2) 渲染图表（针对已评估期号） ---
      - name: Render charts
        env:
          EVAL_ISSUE: ${{ steps.eval.outputs.evaluated_issue }}
        run: |
          ARGS=""
          if [ -n "$EVAL_ISSUE" ]; then ARGS="$ARGS --evaluate-issue $EVAL_ISSUE"; fi
          python -m backend.src.export.chart $ARGS

      # --- 2.5) 追加结构化 run 记录（供 AI 反思） ---
      - name: Append RUN_LOG.jsonl
        if: always()
        env:
          EVAL_ISSUE: ${{ steps.eval.outputs.evaluated_issue }}
        run: |
          EXTRA=$(python -c "import json,os; print(json.dumps({'evaluated_issue':os.environ.get('EVAL_ISSUE') or None}))")
          python -m backend.src.utils.run_log --workflow evaluate --outcome "${{ job.status }}" --extra-json "$EXTRA"

      # --- 3) 先 commit 图 + db，确保 raw.githubusercontent 可访问 ---
      # file_pattern 必须写成多行（| 字面量），单行空格分隔会被 action 拼成一个 git add，
      # 只要任一 pattern 不匹配（例如 docs/RUN_LOG.archive.jsonl 还没达到轮转阈值）整个 step 就 128 退出，
      # 后果：Notify 跳过、Chain predict + backtest 跳过，开奖→预测的事件链直接断链
      - name: Commit charts + db (before notify)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update db & charts before notify"
          file_pattern: |
            data/img/*.png
            data/daletou.db
            data/lstm_state.pt
            data/lstm_meta.json
            data/transformer_state.pt
            data/transformer_meta.json
            data/xgboost_probs.npz
            docs/RUN_LOG.jsonl
            docs/RUN_LOG.archive.jsonl

      # --- 4) 等待 CDN ---
      - name: Wait for CDN
        run: sleep 8

      # --- 5) 推送开奖通知 ---
      - name: Notify evaluate
        if: steps.eval.outputs.evaluated_issue != ''
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WEWORK_WEBHOOK: ${{ secrets.WEWORK_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_AES_KEY: ${{ secrets.BARK_AES_KEY }}
          BARK_AES_IV: ${{ secrets.BARK_AES_IV }}
        run: python -m backend.src.tasks.evaluate --notify-only --issue ${{ steps.eval.outputs.evaluated_issue }}

      # --- 6) 导出 JSON 并 commit ---
      - name: Export JSON
        run: python -m backend.src.export.to_json

      - name: Commit JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): export json for frontend"
          file_pattern: data/**/*.json

      # --- 7) 事件链：新一期评估完成 → 触发 predict 下一期 + backtest 把新数据纳入回测 ---
      # 这就是用户要的节奏："开奖后评估 → 回测新期 → 预测下一期"。
      # 从开奖到下一次停售 ~46h，极为从容，不用抢 20:00 前。
      # predict 和 backtest 并行：
      #   - predict.yml：LSTM/Transformer 增量训练 + 预测下一期 + 推送微信（~2-3min）
      #   - backtest.yml：把刚开奖这一期纳入 walk-forward 回测，评估各模型命中情况
      - name: Chain predict + backtest on new evaluation
        if: steps.eval.outputs.evaluated_issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          EVAL_ISSUE: ${{ steps.eval.outputs.evaluated_issue }}
        run: |
          echo "[chain] 评估完成 issue=$EVAL_ISSUE，触发预测 + 回测"
          sleep 3
          gh workflow run predict.yml --ref "$REF_NAME" \
            && echo "[chain] ✓ predict.yml 已 dispatch" \
            || echo "[chain] ✗ predict.yml dispatch 失败"
          gh workflow run backtest.yml --ref "$REF_NAME" \
            -f start="-200" -f force=false -f models="all" \
            -f auto_continue=true -f time_budget_seconds=3600 \
            && echo "[chain] ✓ backtest.yml 已 dispatch" \
            || echo "[chain] ✗ backtest.yml dispatch 失败"
